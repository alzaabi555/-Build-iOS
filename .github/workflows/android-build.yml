name: Build Android App (Signed APK & AAB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare Shared PDF.js Worker
        run: |
          echo "Preparing PDF.js worker for Web, Android and iOS..."

          mkdir -p public

          if [ -f "node_modules/pdfjs-dist/build/pdf.worker.mjs" ]; then
            cp "node_modules/pdfjs-dist/build/pdf.worker.mjs" "public/pdf.worker.mjs"
            echo "Copied pdf.worker.mjs"
          elif [ -f "node_modules/pdfjs-dist/build/pdf.worker.min.mjs" ]; then
            cp "node_modules/pdfjs-dist/build/pdf.worker.min.mjs" "public/pdf.worker.mjs"
            echo "Copied pdf.worker.min.mjs as pdf.worker.mjs"
          else
            echo "PDF.js worker was not found."
            find node_modules/pdfjs-dist -maxdepth 3 -type f -name "pdf.worker*" -print || true
            exit 1
          fi

          if [ ! -s "public/pdf.worker.mjs" ]; then
            echo "The copied PDF.js worker is missing or empty."
            exit 1
          fi

          echo "PDF.js worker prepared successfully."
          ls -lh "public/pdf.worker.mjs"

      - name: Build Web Assets
        run: npm run build

      - name: Verify Web Build and PDF Worker
        run: |
          if [ ! -d "dist" ]; then
            echo "The dist directory was not generated."
            exit 1
          fi

          if [ ! -s "dist/pdf.worker.mjs" ]; then
            echo "The PDF.js worker was not copied into dist."
            find dist -maxdepth 2 -type f -print
            exit 1
          fi

          echo "Web assets and PDF.js worker verified successfully."

      - name: Sync Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          npx cap sync android

      - name: Update Android Version
        run: |
          BUILD_FILE="android/app/build.gradle"

          if [ ! -f "$BUILD_FILE" ]; then
            echo "Android build.gradle was not found."
            exit 1
          fi

          sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 11/' "$BUILD_FILE"
          sed -i -E 's/versionName[[:space:]]+"[^"]+"/versionName "1.1.2"/' "$BUILD_FILE"

          echo "Updated Android version:"
          grep -E "versionCode|versionName" "$BUILD_FILE"

      - name: Enforce MainActivity, Widget Plugin and Edge-To-Edge
        run: |
          echo "Injecting MainActivity with Android 15 compatibility and Rased widget plugin..."

          APP_ID=$(grep 'applicationId' android/app/build.gradle | awk -F '"' '{print $2}')

          if [ -z "$APP_ID" ]; then
            echo "Unable to determine Android applicationId."
            exit 1
          fi

          DIR="android/app/src/main/java/$(echo "$APP_ID" | tr '.' '/')"

          mkdir -p "$DIR"

          cat > "$DIR/MainActivity.java" <<EOF
          package $APP_ID;

          import android.os.Bundle;
          import androidx.activity.EdgeToEdge;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(RasedScheduleWidgetPlugin.class);
                  super.onCreate(savedInstanceState);

                  // Enable edge-to-edge display for Android 15 compatibility.
                  EdgeToEdge.enable(this);
              }
          }
          EOF

          echo "MainActivity patched successfully."
          echo "MainActivity path: $DIR/MainActivity.java"

          if ! grep -q "registerPlugin(RasedScheduleWidgetPlugin.class)" "$DIR/MainActivity.java"; then
            echo "RasedScheduleWidgetPlugin registration is missing."
            exit 1
          fi

          sed -n '1,80p' "$DIR/MainActivity.java"

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew

          echo "Building APK for Huawei and direct installation..."
          ./gradlew assembleRelease --stacktrace

          echo "Building AAB for Google Play Store..."
          ./gradlew bundleRelease --stacktrace

      - name: Verify Unsigned Android Outputs
        run: |
          echo "APK files:"
          find android/app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" -print

          echo "AAB files:"
          find android/app/build/outputs/bundle/release -maxdepth 1 -type f -name "*.aab" -print

          if ! find android/app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" | grep -q .; then
            echo "No APK file was generated."
            exit 1
          fi

          if ! find android/app/build/outputs/bundle/release -maxdepth 1 -type f -name "*.aab" | grep -q .; then
            echo "No AAB file was generated."
            exit 1
          fi

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-AAB
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
