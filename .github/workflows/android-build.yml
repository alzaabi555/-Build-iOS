name: Build Android App (Signed APK & AAB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Update Version and API
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/versionCode [0-9]*/versionCode 4/g' android/app/build.gradle
            sed -i 's/versionName "[^"]*"/versionName "1.0.4"/g' android/app/build.gradle
          fi

      # 👈 التعديل السحري الأول: بناء النسختين معاً (APK و AAB) في سطر واحد
      - name: Build Android Release (APK & AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace

      # 👈 التوقيع الجراحي لنسخة هواوي (APK)
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # 👈 التوقيع الجراحي لنسخة جوجل (AAB)
      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # 👈 تسليم نسخة هواوي
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-APK
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}

      # 👈 تسليم نسخة جوجل
      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-AAB
          path: ${{ steps.sign_aab.outputs.signedReleaseFile }}
