name: Build Android App (Signed APK & AAB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npx vite build --base=./ --target=es2022

      - name: Sync Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          npx cap sync android

      - name: Update Android Version
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 11/g' android/app/build.gradle
            sed -i -E 's/versionName[[:space:]]+"[^"]*"/versionName "1.1.2"/g' android/app/build.gradle

            echo "Android version updated:"
            grep -E "versionCode|versionName" android/app/build.gradle
          else
            echo "android/app/build.gradle was not found."
            exit 1
          fi

      - name: Enforce MainActivity, Widget Plugin and Edge-To-Edge
        run: |
          echo "Injecting MainActivity with Android 15 compatibility and Rased widget plugin..."

          APP_ID=$(grep 'applicationId' android/app/build.gradle | awk -F '"' '{print $2}')

          if [ -z "$APP_ID" ]; then
            echo "Unable to determine Android applicationId."
            exit 1
          fi

          DIR="android/app/src/main/java/$(echo "$APP_ID" | tr '.' '/')"

          mkdir -p "$DIR"

          cat > "$DIR/MainActivity.java" <<EOF
          package $APP_ID;

          import android.os.Bundle;
          import androidx.activity.EdgeToEdge;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(RasedScheduleWidgetPlugin.class);
                  super.onCreate(savedInstanceState);

                  EdgeToEdge.enable(this);
              }
          }
          EOF

          if ! grep -q "registerPlugin(RasedScheduleWidgetPlugin.class)" "$DIR/MainActivity.java"; then
            echo "RasedScheduleWidgetPlugin registration is missing."
            exit 1
          fi

          echo "MainActivity patched successfully."
          sed -n '1,80p' "$DIR/MainActivity.java"

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew

          echo "Building APK for Huawei and direct installation..."
          ./gradlew assembleRelease --stacktrace

          echo "Building AAB for Google Play Store..."
          ./gradlew bundleRelease --stacktrace

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-AAB
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
