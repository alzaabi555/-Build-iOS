name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # إذا كان فرعك الرئيسي اسمه master، قم بتغييرها هنا

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npx vite build --base=/rased-teacher/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      # 💉 الحقنة الأولى: إجبار السيرفر على تثبيت كل أدوات التطوير (Vite)
      - name: Install dependencies
        run: npm install --include=dev --legacy-peer-deps
        
      # 💉 الحقنة الثانية: البناء باستخدام اسم مستودعك الفعلي الذي ظهر في الخطأ
      - name: Build project
        run: npx vite build --base=/-Build-iOS/
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
